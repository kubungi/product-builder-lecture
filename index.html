<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tool: Lotto & Animal Test</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body data-theme="dark">
    <button id="theme-toggle">Light Mode</button>
    
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <lotto-numbers></lotto-numbers>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="container animal-test-container">
        <h2>동물상 테스트 (강아지 vs 고양이)</h2>
        <p>사진을 업로드하여 동물상을 확인해보세요!</p>
        <div class="upload-section">
            <input type="file" id="image-upload" accept="image/*" hidden>
            <button type="button" id="upload-btn" class="submit-btn">사진 업로드하기</button>
        </div>
        <div id="image-preview-container" style="display: none; margin-top: 20px;">
            <img id="image-preview" src="" alt="Preview" style="max-width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
        </div>
        <div id="label-container"></div>
    </div>

    <div class="form-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xvzveepk" method="POST">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" required placeholder="성함을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="_replyto" required placeholder="이메일 주소를 입력해주세요">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" required placeholder="문의하실 내용을 입력해주세요"></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
